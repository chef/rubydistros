expeditor:
  defaults:
    buildkite:
      timeout_in_minutes: 90
      retry:
        automatic:
          limit: 1
env:
  VERSION: 1.1.16

steps:
- id: build-and-push-on-windows-2019-server-rubydistros-dockerhub-3-1-7
  label: ":docker::windows: build-and-push-rubydistros-dockerhub-3.1-7"
  commands:
    - "docker build . -f 3.1.7/windows/2019/Dockerfile -t windows-2019:3.1.7"
    - "docker tag windows-2019:3.1.7 docker.io/rubydistros/windows-2019:3.1.7"
  #  - "docker push docker.io/rubydistros/windows-2019:3.1.7"
  agents:
    queue: docker-windows-2019
  plugins:
    - docker-login#v2.1.0:
        username: expeditor

